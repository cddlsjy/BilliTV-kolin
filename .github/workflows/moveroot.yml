name: 移动文件到根目录

on:
  workflow_dispatch:  # 手动触发，点击按钮即可运行

jobs:
  move:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 将子目录内的所有文件移动到根目录
        run: |
          # 假设你的项目文件在 ljkradiosdk19-code 子目录里（请根据实际目录名修改）
          SUBDIR="04-13"
          
          # 如果子目录存在，则移动所有内容到根目录
          if [ -d "$SUBDIR" ]; then
            # 移动普通文件和目录
            shopt -s dotglob  # 包括隐藏文件（如 .gitignore）
            mv $SUBDIR/* . 2>/dev/null || true
            # 删除空子目录
            rmdir $SUBDIR 2>/dev/null || true
          else
            echo "子目录 $SUBDIR 不存在，请修改脚本中的目录名"
            exit 1
          fi

      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "自动将文件移动到根目录"
          git push