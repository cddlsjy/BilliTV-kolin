name: Unpack ZIP and Flatten to Root

on:
  push:
    paths: ['**.zip']           # 推送 ZIP 文件时自动触发（默认处理最新/唯一的 zip）
  workflow_dispatch:            # 手动触发，可选择处理哪个 ZIP 文件
    inputs:
      zip_file:
        description: '要处理的 ZIP 文件名（留空则处理所有）'
        required: false
        default: ''
        type: choice
        options:
          - ''                  # 空选项 = 处理所有
          # 注意：选项需要在运行时动态生成，但 GitHub Actions 不支持
          # 因此这里留空，由脚本自动检测并让用户手动输入文件名

jobs:
  unpack-and-move:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 检测可用的 ZIP 文件
        id: detect
        run: |
          # 获取所有 zip 文件列表
          zip_list=$(ls *.zip 2>/dev/null | tr '\n' ' ' || echo "")
          echo "发现 ZIP 文件: $zip_list"
          echo "zip_list=$zip_list" >> $GITHUB_OUTPUT
          
          # 如果没有 zip 文件，提前退出
          if [ -z "$zip_list" ]; then
            echo "没有找到 ZIP 文件，任务结束"
            exit 0
          fi

      - name: 解压指定的 ZIP 文件（或全部）
        run: |
          shopt -s dotglob
          
          # 获取用户输入或自动检测
          TARGET="${{ inputs.zip_file }}"
          
          # 如果手动触发了但没有指定文件名，或者自动触发，则处理所有
          if [ -z "$TARGET" ]; then
            echo "处理所有 ZIP 文件"
            zip_files=(*.zip)
          else
            echo "处理指定的 ZIP 文件: $TARGET"
            if [ ! -f "$TARGET" ]; then
              echo "错误：文件 '$TARGET' 不存在"
              echo "可用的 ZIP 文件: ${{ steps.detect.outputs.zip_list }}"
              exit 1
            fi
            zip_files=("$TARGET")
          fi
          
          for zipfile in "${zip_files[@]}"; do
            [ -e "$zipfile" ] || continue
            
            echo "正在处理: $zipfile"
            
            temp_dir="${zipfile%.zip}_temp"
            mkdir -p "$temp_dir"
            
            unzip -o "$zipfile" -d "$temp_dir"
            
            # 智能判断：若临时目录内仅有一个子目录，则移出其内容；否则直接移动所有内容
            items=("$temp_dir"/*)
            if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
              subdir="${items[0]}"
              echo "检测到顶层目录 '$subdir'，将其内容移动到根目录"
              mv "$subdir"/* . 2>/dev/null || true
              mv "$subdir"/.[!.]* . 2>/dev/null || true
              rmdir "$subdir"
            else
              echo "移动临时目录中的所有内容到根目录"
              mv "$temp_dir"/* . 2>/dev/null || true
              mv "$temp_dir"/.[!.]* . 2>/dev/null || true
            fi
            
            rm -rf "$temp_dir"
            rm -f "$zipfile"
          done

      - name: 提交更改
        if: steps.detect.outputs.zip_list != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "自动解压 ZIP 并整理目录结构"
          git push