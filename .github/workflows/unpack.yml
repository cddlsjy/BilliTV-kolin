name: Unpack Zip to Root

on:
  push:
    paths: ['**.zip']
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 解压所有 zip 文件到根目录
        run: |
          # 查找所有 .zip 文件，解压到当前目录（根目录），覆盖已有文件
          find . -maxdepth 1 -name "*.zip" -type f -exec unzip -o {} \;
          # 删除已解压的 zip 文件
          find . -maxdepth 1 -name "*.zip" -type f -delete

      - name: 提交解压后的文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "解压 zip 到根目录"
          git push